<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美白打卡记录</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" class="page">
        <div class="container">
            <div class="card">
                <h1>美白打卡记录</h1>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginUsername">用户名</label>
                        <input type="text" id="loginUsername" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">密码</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <div class="form-group checkbox-group">
                        <label>
                            <input type="checkbox" id="rememberMe" checked>
                            记住我（30天）
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary">登录</button>
                    <button type="button" class="btn btn-secondary" onclick="showRegister()">注册新账号</button>
                </form>
                <div id="loginError" class="error-message"></div>
            </div>
        </div>
    </div>

    <!-- 注册页面 -->
    <div id="registerPage" class="page hidden">
        <div class="container">
            <div class="card">
                <h1>注册账号</h1>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="registerUsername">用户名</label>
                        <input type="text" id="registerUsername" required>
                    </div>
                    <div class="form-group">
                        <label for="registerPassword">密码（至少6位）</label>
                        <input type="password" id="registerPassword" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">确认密码</label>
                        <input type="password" id="confirmPassword" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary">注册</button>
                    <button type="button" class="btn btn-secondary" onclick="showLogin()">返回登录</button>
                </form>
                <div id="registerError" class="error-message"></div>
            </div>
        </div>
    </div>

    <!-- 主页面 -->
    <div id="mainPage" class="page hidden">
        <div class="header">
            <h1>美白打卡记录</h1>
            <div class="user-info">
                <span id="usernameDisplay"></span>
                <button class="btn btn-small" onclick="logout()">登出</button>
            </div>
        </div>

        <div class="container">
            <!-- 统计信息 -->
            <div class="stats-container">
                <div class="stat-card">
                    <div class="stat-value" id="currentStreak">0</div>
                    <div class="stat-label">当前连续天数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="maxStreak">0</div>
                    <div class="stat-label">最长连续天数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalCheckins">0</div>
                    <div class="stat-label">总打卡次数</div>
                </div>
            </div>

            <!-- 打卡区域 -->
            <div class="card checkin-card">
                <h2>今日打卡</h2>
                <div id="checkinStatus"></div>
                <form id="checkinForm" class="hidden">
                    <div class="form-group">
                        <label for="photoUpload" class="upload-label">
                            <span>📷 选择照片</span>
                            <input type="file" id="photoUpload" accept="image/jpeg,image/jpg,image/png" required>
                        </label>
                        <div id="photoPreview" class="photo-preview hidden">
                            <img id="previewImage" alt="预览">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">提交打卡</button>
                </form>
                <div id="checkinError" class="error-message"></div>
            </div>

            <!-- 视图切换 -->
            <div class="view-controls">
                <h2>查看记录</h2>
                <div class="view-buttons">
                    <button class="btn btn-view active" onclick="switchView('grid', event)">网格视图</button>
                    <button class="btn btn-view" onclick="switchView('timeline', event)">时间线视图</button>
                    <button class="btn btn-view" onclick="switchView('comparison', event)">对比视图</button>
                    <button class="btn btn-view" onclick="switchView('calendar', event)">日历视图</button>
                </div>
            </div>

            <!-- 网格视图 -->
            <div id="gridView" class="view-container">
                <div id="gridContent" class="grid-container"></div>
            </div>

            <!-- 时间线视图 -->
            <div id="timelineView" class="view-container hidden">
                <div id="timelineContent" class="timeline-container"></div>
            </div>

            <!-- 对比视图 -->
            <div id="comparisonView" class="view-container hidden">
                <div class="comparison-controls">
                    <p>选择两张照片进行对比（点击照片选择）</p>
                    <button class="btn btn-secondary" onclick="clearComparison()">清除选择</button>
                </div>
                <div id="comparisonContent" class="comparison-container">
                    <div class="comparison-side">
                        <h3>照片 1</h3>
                        <div id="compareSlot1" class="compare-slot">点击下方照片选择</div>
                    </div>
                    <div class="comparison-side">
                        <h3>照片 2</h3>
                        <div id="compareSlot2" class="compare-slot">点击下方照片选择</div>
                    </div>
                </div>
                <div id="comparisonGrid" class="grid-container"></div>
            </div>

            <!-- 日历视图 -->
            <div id="calendarView" class="view-container hidden">
                <div class="calendar-controls">
                    <button class="btn btn-small" onclick="changeMonth(-1)">← 上月</button>
                    <h3 id="calendarMonth"></h3>
                    <button class="btn btn-small" onclick="changeMonth(1)">下月 →</button>
                </div>
                <div id="calendarContent" class="calendar-container"></div>
            </div>
        </div>
    </div>

    <script src="app.js?v=2"></script>
</body>
</html>
